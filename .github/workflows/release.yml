name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build & sign release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build signed release APK
        run: ./gradlew assembleVanillaRelease --no-daemon
        env:
          GRADLE_OPTS: '-Dorg.gradle.jvmargs=-Xmx4g'
          SIGNING_STORE_FILE: ${{ github.workspace }}/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEYSTORE_STORE_PASSWORD }}

      - name: Rename APK
        id: apk
        run: |
          TAG=${GITHUB_REF_NAME}
          APK_NAME="app-updater-${TAG}.apk"
          mv app/build/outputs/apk/vanilla/release/*.apk \
             app/build/outputs/apk/vanilla/release/${APK_NAME}
          echo "apk_name=${APK_NAME}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/vanilla/release/${{ steps.apk.outputs.apk_name }}

      - name: Update updates.json
        run: |
          TAG=${GITHUB_REF_NAME}
          VERSION_NAME=${TAG#v}
          VERSION_CODE=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*' | head -1)
          SIZE=$(stat -c%s "app/build/outputs/apk/vanilla/release/${{ steps.apk.outputs.apk_name }}")
          APK_URL="https://github.com/gwku/aurora-app-updater/releases/download/${TAG}/${{ steps.apk.outputs.apk_name }}"
          DATE=$(date "+%b %d, %Y")

          python3 -c "
          import json
          print(json.dumps({
            'version_name': '${VERSION_NAME}',
            'version_code': ${VERSION_CODE},
            'aurora_build': '${APK_URL}',
            'fdroid_build': '',
            'changelog': 'https://github.com/gwku/aurora-app-updater/releases/tag/${TAG}',
            'size': ${SIZE},
            'updated_on': '${DATE}'
          }, indent=2))
          " > updates.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates.json
          git commit -m "Update updates.json for ${TAG}"
          git push origin HEAD:main
